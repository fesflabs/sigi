version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sigi_db
    env_file:
      - .env
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sigi_backend
    env_file:
      - .env
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - db
    restart: unless-stopped
    command: >
      sh -c "if [ -f app/main.py ]; then uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload; else tail -f /dev/null; fi"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sigi_frontend
    env_file:
      - .env
    ports:
      - "3001:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
    command: >
      sh -c "if [ -f package.json ]; then npm run dev; else tail -f /dev/null; fi"

volumes:
  postgres_data:
